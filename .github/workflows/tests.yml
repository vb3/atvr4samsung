name: CI

"on": [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # The eb4efd9 compatibility subprocess executes the actual baseline marker contract.
          fetch-depth: 0
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      # astral-sh/setup-uv v5.4.0
      - uses: astral-sh/setup-uv@22695119d769bdb6f7032ad67b9bca0ef8c4a174
        with:
          version: "0.11.16"
          # SHA-256 of astral-sh/uv 0.11.16's uv-x86_64-unknown-linux-gnu.tar.gz.
          checksum: "74947fe2c03315cf07e82ab3acc703eddef01aba4d5232a98e4c6825ec116131"
      - name: Install
        run: uv sync --all-extras --locked
      - name: Test
        run: uv run --frozen --no-sync python -m pytest -q
      - name: Validate secure release assets
        run: |
          set -euo pipefail
          bash -n scripts/install.sh scripts/build.sh
          rm -rf .release-validation
          trap 'rm -rf .release-validation' EXIT
          mkdir -p .release-validation/dist
          VERSION="$(python -I -S -c "import sys,tomllib; print(tomllib.load(sys.stdin.buffer)['project']['version'])" < pyproject.toml)"
          LOCK_VERSION="${VERSION//./-}"
          uv run --frozen --no-sync python -m build --no-isolation --outdir .release-validation/dist
          uv export \
            --quiet \
            --locked \
            --no-dev \
            --no-emit-project \
            --no-emit-local \
            --no-sources \
            --no-build \
            --format pylock.toml \
            --output-file ".release-validation/dist/pylock.atvr4samsung-${LOCK_VERSION}.toml"
          uv run --frozen --no-sync python -I -S scripts/release_assets.py \
            --version "${VERSION}" \
            --dist-dir .release-validation/dist
          uv run --frozen --no-sync python -I -S scripts/release_assets.py \
            --verify \
            --version "${VERSION}" \
            --dist-dir .release-validation/dist
          uv run --frozen --no-sync python -I -S scripts/verify_artifacts.py \
            ".release-validation/dist/atvr4samsung-${VERSION}-py3-none-any.whl" \
            ".release-validation/dist/atvr4samsung-${VERSION}.tar.gz"
          uv run --frozen --no-sync python - <<'PY'
          from pathlib import Path
          import yaml

          for path in Path(".github/workflows").glob("*.yml"):
              if not isinstance(yaml.safe_load(path.read_text(encoding="utf-8")), dict):
                  raise SystemExit(f"{path}: expected a YAML mapping")
          PY
