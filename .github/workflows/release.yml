name: Release

"on":
  push:
    branches: [main]
    paths: ["pyproject.toml"]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Decide whether to release
        id: decide
        env:
          BEFORE: ${{ github.event.before }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          read_version() {
            python -I -S -c \
              "import sys,tomllib; print(tomllib.load(sys.stdin.buffer)['project']['version'])"
          }

          current="$(read_version < pyproject.toml)"
          previous=""
          if [ -n "${BEFORE:-}" ] \
             && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
             && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            previous="$(git show "${BEFORE}:pyproject.toml" 2>/dev/null | read_version 2>/dev/null || true)"
          fi

          decision="$(python -I -S scripts/release_decision.py "$previous" "$current")"
          tag="v${current}"
          release_error="$(mktemp)"
          if existing="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" \
              --jq 'if .draft then "draft" else "published" end' \
              2>"$release_error"
          )"; then
            if [ "$existing" = "draft" ]; then
              target="$(
                gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" \
                  --jq .target_commitish
              )"
              target_commit="$(
                gh api "repos/${GITHUB_REPOSITORY}/commits/${target}" --jq .sha
              )"
              test "$target_commit" = "$GITHUB_SHA"
            fi
          elif grep -Fq '(HTTP 404)' "$release_error"; then
            existing="absent"
          else
            cat "$release_error" >&2
            rm -f "$release_error"
            exit 1
          fi
          rm -f "$release_error"
          if [ "$decision" = "release" ] && [ "$existing" = "published" ]; then
            decision="skip"
          fi

          {
            echo "release=$([ "$decision" = "release" ] && echo true || echo false)"
            echo "version=$current"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.release == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      TAG: ${{ needs.detect.outputs.tag }}
      VERSION: ${{ needs.detect.outputs.version }}
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      # astral-sh/setup-uv v5.4.0
      - uses: astral-sh/setup-uv@22695119d769bdb6f7032ad67b9bca0ef8c4a174
        with:
          version: "0.11.16"
          checksum: "74947fe2c03315cf07e82ab3acc703eddef01aba4d5232a98e4c6825ec116131"

      - name: Install locked development environment
        run: uv sync --all-extras --locked

      - name: Test gate
        run: uv run --frozen --no-sync python -m pytest -q

      - name: Validate Python package payload
        run: |
          set -euo pipefail
          mkdir -p .package-validation
          uv run --frozen --no-sync python -m build --no-isolation --outdir .package-validation
          uv run --frozen --no-sync python -m twine check \
            ".package-validation/atvr4samsung-${VERSION}-py3-none-any.whl" \
            ".package-validation/atvr4samsung-${VERSION}.tar.gz"
          uv run --frozen --no-sync python -I -S scripts/verify_artifacts.py \
            ".package-validation/atvr4samsung-${VERSION}-py3-none-any.whl" \
            ".package-validation/atvr4samsung-${VERSION}.tar.gz"

      - name: Package deployment bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          uv run --frozen --no-sync python -I -S scripts/container_bundle.py \
            --version "$VERSION" \
            --output-dir dist
          uv run --frozen --no-sync python -I -S scripts/container_bundle.py \
            --verify \
            --version "$VERSION" \
            --output-dir dist

      - name: Install pinned Syft
        run: |
          set -euo pipefail
          mkdir -p .syft
          archive="syft_1.48.0_linux_amd64.tar.gz"
          curl --fail --silent --show-error --location \
            --user-agent 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36' \
            --header 'Accept: application/octet-stream' \
            --header 'Accept-Language: en-US,en;q=0.9' \
            --output ".syft/$archive" \
            "https://github.com/anchore/syft/releases/download/v1.48.0/$archive"
          echo "6cef9a7f37220d9067eaf9cfaaa2fce986e9f320a8d42cbc36658c99af78ea04  .syft/$archive" \
            | sha256sum --check -
          tar -xzf ".syft/$archive" -C .syft syft
          test "$(.syft/syft version -o json | jq -r .version)" = "1.48.0"

      - name: Install pinned Buildx
        run: |
          set -euo pipefail
          mkdir -p .buildx "$HOME/.docker/cli-plugins"
          binary="buildx-v0.35.0.linux-amd64"
          curl --fail --silent --show-error --location \
            --user-agent 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36' \
            --header 'Accept: application/octet-stream' \
            --header 'Accept-Language: en-US,en;q=0.9' \
            --output ".buildx/$binary" \
            "https://github.com/docker/buildx/releases/download/v0.35.0/$binary"
          echo "d41ece72044243b4f58b343441ae37446d9c29a7d6b5e11c61847bbcf8f7dfda  .buildx/$binary" \
            | sha256sum --check -
          install -m 0755 ".buildx/$binary" "$HOME/.docker/cli-plugins/docker-buildx"
          docker buildx version | grep -F 'v0.35.0'

      # docker/setup-qemu-action v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        with:
          image: tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Buildx
        run: |
          docker buildx create \
            --name atvr4samsung-release \
            --driver docker-container \
            --driver-opt image=moby/buildkit:buildx-stable-1@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec \
            --use
          docker buildx inspect --bootstrap

      # docker/login-action v4
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/build-push-action v7
      - name: Build and push multi-platform image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          builder: atvr4samsung-release
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          build-args: |
            VERSION=${{ env.VERSION }}
            VCS_REF=${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve platform image digests
        id: platforms
        run: |
          set -euo pipefail
          docker buildx imagetools inspect \
            "${IMAGE_NAME}@${{ steps.image.outputs.digest }}" \
            --raw > image-index.json
          amd64="$(
            jq -er '
              [.manifests[]
               | select(.platform.os == "linux" and .platform.architecture == "amd64")
               | .digest]
              | if length == 1 then .[0] else error("expected one linux/amd64 manifest") end
            ' image-index.json
          )"
          arm64="$(
            jq -er '
              [.manifests[]
               | select(.platform.os == "linux" and .platform.architecture == "arm64")
               | .digest]
              | if length == 1 then .[0] else error("expected one linux/arm64 manifest") end
            ' image-index.json
          )"
          test "$amd64" != "$arm64"
          {
            echo "amd64=$amd64"
            echo "arm64=$arm64"
          } >> "$GITHUB_OUTPUT"

      # actions/attest v4.2.0, reviewed 2026-07-16
      - name: Attest image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Generate amd64 image SBOM
        run: |
          .syft/syft \
            "registry:${IMAGE_NAME}@${{ steps.platforms.outputs.amd64 }}" \
            --output "spdx-json=dist/atvr4samsung-${VERSION}-linux-amd64.spdx.json"

      - name: Attest amd64 image SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.platforms.outputs.amd64 }}
          sbom-path: dist/atvr4samsung-${{ env.VERSION }}-linux-amd64.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Generate arm64 image SBOM
        run: |
          .syft/syft \
            "registry:${IMAGE_NAME}@${{ steps.platforms.outputs.arm64 }}" \
            --output "spdx-json=dist/atvr4samsung-${VERSION}-linux-arm64.spdx.json"

      - name: Attest arm64 image SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.platforms.outputs.arm64 }}
          sbom-path: dist/atvr4samsung-${{ env.VERSION }}-linux-arm64.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Verify public anonymous image access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          package_name="${IMAGE_NAME##*/}"
          if ! visibility="$(
            gh api \
              "users/${GITHUB_REPOSITORY_OWNER}/packages/container/${package_name}" \
              --jq .visibility
          )"; then
            echo "::error::GHCR package ${IMAGE_NAME} is not publicly visible."
            exit 1
          fi
          if [ "$visibility" != "public" ]; then
            echo "::error::GHCR package ${IMAGE_NAME} must be made public before publishing a release."
            exit 1
          fi
          anonymous_config="$(mktemp -d)"
          trap 'rm -rf "$anonymous_config"' EXIT
          docker --config "$anonymous_config" pull \
            "${IMAGE_NAME}@${{ steps.image.outputs.digest }}" >/dev/null

      - name: Attest deployment bundle
        id: deploy_attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: dist/atvr4samsung-${{ env.VERSION }}-deploy.tar.gz

      - name: Publish deployment bundle attestation
        run: |
          cp -- \
            "${{ steps.deploy_attestation.outputs.bundle-path }}" \
            "dist/atvr4samsung-${VERSION}-deploy.sigstore.json"
          chmod 0644 "dist/atvr4samsung-${VERSION}-deploy.sigstore.json"

      - name: Create release manifest
        run: |
          set -euo pipefail
          bundle_sha256="$(
            sha256sum "dist/atvr4samsung-${VERSION}-deploy.tar.gz" | awk '{ print $1 }'
          )"
          {
            printf 'ATVR4SAMSUNG_RELEASE_VERSION=%s\n' "$VERSION"
            printf 'ATVR4SAMSUNG_RELEASE_IMAGE=%s@%s\n' \
              "$IMAGE_NAME" "${{ steps.image.outputs.digest }}"
            printf 'ATVR4SAMSUNG_RELEASE_SOURCE_COMMIT=%s\n' "$GITHUB_SHA"
            printf 'ATVR4SAMSUNG_DEPLOY_BUNDLE_SHA256=%s\n' "$bundle_sha256"
          } > "dist/atvr4samsung-${VERSION}-release.env"

      - name: Attest release manifest
        id: release_manifest_attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: dist/atvr4samsung-${{ env.VERSION }}-release.env

      - name: Publish release manifest attestation
        run: |
          cp -- \
            "${{ steps.release_manifest_attestation.outputs.bundle-path }}" \
            "dist/atvr4samsung-${VERSION}-release.sigstore.json"
          chmod 0644 \
            "dist/atvr4samsung-${VERSION}-release.env" \
            "dist/atvr4samsung-${VERSION}-release.sigstore.json"

      - name: Extract release notes
        run: |
          set -euo pipefail
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > notes.md
          sed -i -e '/./,$!d' notes.md
          if [ ! -s notes.md ]; then
            printf 'Container release %s.\n' "$TAG" > notes.md
          fi

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets=(
            "dist/atvr4samsung-${VERSION}-deploy.tar.gz"
            "dist/atvr4samsung-${VERSION}-deploy.sigstore.json"
            "dist/atvr4samsung-${VERSION}-release.env"
            "dist/atvr4samsung-${VERSION}-release.sigstore.json"
            "dist/atvr4samsung-${VERSION}-linux-amd64.spdx.json"
            "dist/atvr4samsung-${VERSION}-linux-arm64.spdx.json"
          )
          if gh release view "$TAG" --json isDraft --jq .isDraft >/dev/null 2>&1; then
            test "$(gh release view "$TAG" --json isDraft --jq .isDraft)" = "true"
            target="$(gh release view "$TAG" --json targetCommitish --jq .targetCommitish)"
            target_commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${target}" --jq .sha)"
            test "$target_commit" = "$GITHUB_SHA"
            gh release upload "$TAG" "${assets[@]}" --clobber
            gh release edit "$TAG" --title "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" "${assets[@]}" \
              --draft \
              --title "$TAG" \
              --notes-file notes.md \
              --target "$GITHUB_SHA"
          fi

      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$TAG" --draft=false
