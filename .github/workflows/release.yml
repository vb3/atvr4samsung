name: Release

# Publish one immutable, versioned release for every strictly increasing X.Y.Z
# project version. The release decision is pure and unit-tested.
"on":
  push:
    branches: [main]
    paths: ["pyproject.toml"]

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Decide whether to release
        id: decide
        env:
          BEFORE: ${{ github.event.before }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          read_version() { python -I -S -c "import sys,tomllib; print(tomllib.load(sys.stdin.buffer)['project']['version'])"; }

          CUR="$(read_version < pyproject.toml)"
          echo "Current version: $CUR"

          # Previous version = pyproject.toml at the commit before this push. The zero-SHA means a
          # brand-new branch / first push (no parent), so there is no previous version → skip.
          PREV=""
          if [ -n "${BEFORE:-}" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
             && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            PREV="$(git show "${BEFORE}:pyproject.toml" 2>/dev/null | read_version 2>/dev/null || true)"
          fi
          echo "Previous version: ${PREV:-<none>}"

          DECISION="$(python -I -S scripts/release_decision.py "$PREV" "$CUR")"
          TAG="v$CUR"

          # Idempotency: never try to re-create an existing release/tag (e.g. on a re-run).
          if [ "$DECISION" = "release" ] && gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            DECISION="skip"
          fi

          echo "Decision: $DECISION (tag $TAG)"
          {
            echo "release=$([ "$DECISION" = "release" ] && echo true || echo false)"
            echo "version=$CUR"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.release == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.detect.outputs.tag }}
      VERSION: ${{ needs.detect.outputs.version }}
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      # astral-sh/setup-uv v5.4.0
      - uses: astral-sh/setup-uv@22695119d769bdb6f7032ad67b9bca0ef8c4a174
        with:
          version: "0.11.16"
          # SHA-256 of astral-sh/uv 0.11.16's uv-x86_64-unknown-linux-gnu.tar.gz.
          checksum: "74947fe2c03315cf07e82ab3acc703eddef01aba4d5232a98e4c6825ec116131"

      - name: Install locked development environment
        run: uv sync --all-extras --locked

      - name: Test gate
        run: uv run --frozen --no-sync python -m pytest -q

      - name: Build wheel + sdist
        run: |
          uv run --frozen --no-sync python -m build --no-isolation
          uv run --frozen --no-sync python -m twine check \
            "dist/atvr4samsung-${VERSION}-py3-none-any.whl" \
            "dist/atvr4samsung-${VERSION}.tar.gz"

      - name: Verify built artifacts match the version
        run: |
          set -euo pipefail
          test -f "dist/atvr4samsung-${VERSION}-py3-none-any.whl"
          test -f "dist/atvr4samsung-${VERSION}.tar.gz"
          test "$(find dist -maxdepth 1 -name 'atvr4samsung-*-py3-none-any.whl' -type f | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -name 'atvr4samsung-*.tar.gz' -type f | wc -l)" -eq 1

      - name: Verify legal payload in release artifacts
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python -I -S scripts/verify_artifacts.py \
            "dist/atvr4samsung-${VERSION}-py3-none-any.whl" \
            "dist/atvr4samsung-${VERSION}.tar.gz"

      - name: Calculate runtime-lock asset name
        id: release_asset_names
        run: echo "runtime_lock=pylock.atvr4samsung-${VERSION//./-}.toml" >> "$GITHUB_OUTPUT"

      - name: Export exact wheel-only PEP 751 runtime lock
        run: |
          uv export \
            --quiet \
            --locked \
            --no-dev \
            --no-emit-project \
            --no-emit-local \
            --no-sources \
            --no-build \
            --format pylock.toml \
            --output-file "dist/${{ steps.release_asset_names.outputs.runtime_lock }}"

      - name: Package versioned installer and SHA-256 manifest
        run: |
          uv run --frozen --no-sync python -I -S scripts/release_assets.py \
            --version "$VERSION" \
            --dist-dir dist

      - name: Verify complete release asset set
        run: |
          uv run --frozen --no-sync python -I -S scripts/release_assets.py \
            --verify \
            --version "$VERSION" \
            --dist-dir dist

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          # Pull the "## [VERSION] ..." section body (up to the next "## [" header). Fall back to an
          # empty file so the release step can use --generate-notes instead.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > notes.md || true
          # Trim leading/trailing blank lines.
          sed -i -e '/./,$!d' notes.md
          echo "---- notes.md ----"; cat notes.md || true

      # actions/attest v4.2.0, reviewed 2026-07-16
      - name: Attest every versioned release asset
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: |
            dist/atvr4samsung-${{ env.VERSION }}-install.sh
            dist/atvr4samsung-${{ env.VERSION }}-py3-none-any.whl
            dist/atvr4samsung-${{ env.VERSION }}.tar.gz
            dist/${{ steps.release_asset_names.outputs.runtime_lock }}
            dist/atvr4samsung-${{ env.VERSION }}-sha256sums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          runtime_lock="pylock.atvr4samsung-${VERSION//./-}.toml"
          ASSETS=(
            "dist/atvr4samsung-${VERSION}-install.sh"
            "dist/atvr4samsung-${VERSION}-py3-none-any.whl"
            "dist/atvr4samsung-${VERSION}.tar.gz"
            "dist/${runtime_lock}"
            "dist/atvr4samsung-${VERSION}-sha256sums.txt"
          )
          if [ -s notes.md ]; then
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --notes-file notes.md --target "$GITHUB_SHA"
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
          fi
