# atvr4samsung — example configuration.
# Copy this to `config.yaml` (gitignored) and edit. NEVER commit the real config.yaml
# or the Samsung token file.

companion:
  # Name shown in the iPhone's Control Center remote picker.
  device_name: "Frame Living Room"

  # TCP port the Companion server listens on. 0 = ephemeral (mDNS advertises whatever was chosen).
  # Pick a fixed port if your VLAN firewall needs a static allow rule for phone -> Pi.
  port: 49152

  # rpMd value advertised over mDNS (which Apple TV model we imitate). AppleTV14,1 = Apple TV 4K 3rd-gen; required for CC Power.
  model: "AppleTV14,1"

  # Where pairing keys, persisted server identity, and the temporary enrollment record live.
  # Required for the service; keep OFF any shared/world-readable directory.
  # Enrollment has no static PIN: do not add companion.pin; use `atvr4samsung pair` for a 5-minute window.
  state_dir: "~/.local/state/atvr4samsung"

samsung:
  host: "192.168.1.50"            # Frame TV IP
  mac: "AA:BB:CC:DD:EE:FF"        # Frame TV wired MAC (for Wake-on-LAN)
  port: 8002                      # Required: TLS + persistent token. Plaintext port 8001 is refused.
  name: "atvr4samsung"            # remote name shown on the TV's Allow/Deny prompt
  token_file: "~/.local/state/atvr4samsung/samsung-token.txt"  # created/repaired as 0600
  # Before the service can connect, run:
  #   atvr4samsung trust-tv
  # inspect the displayed SHA-256, then re-run with --approve-sha256 <fingerprint>.
  # The approved exact PEM certificate is stored atomically as 0600 at
  # companion.state_dir/samsung-tls-cert.pem; do not copy it into this config.

  wol:
    enabled: true
    # Pi is on the SAME subnet as the TV -> directed broadcast works.
    # If you ever move the Pi to another subnet, set this to the TV's IP for unicast WoL
    # (requires the TV's "Fast Start / Instant On" = ON so the NIC keeps listening).
    broadcast: "192.168.1.255"
    port: 9

logging:
  level: "INFO"                   # DEBUG adds safe Companion metadata; Samsung dependency payloads stay suppressed
